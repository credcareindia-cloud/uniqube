<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UniQube 3D IFC Viewer</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;500;700&display=swap" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
      /* Embedded styles for iframe integration */
      body {
        margin: 0;
        padding: 0;
        font-family: 'Rajdhani', sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        overflow: hidden;
      }
      
      #container {
        width: 100vw;
        height: 100vh;
        position: relative;
      }
      
      .loading-overlay {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.8);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
      }
      
      .loading-content {
        background: white;
        padding: 2rem;
        border-radius: 8px;
        text-align: center;
        max-width: 400px;
      }
      
      .progress-bar {
        width: 100%;
        height: 8px;
        background: #f0f0f0;
        border-radius: 4px;
        overflow: hidden;
        margin: 1rem 0;
      }
      
      .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, #667eea, #764ba2);
        width: 0%;
        transition: width 0.3s ease;
      }
      
      #toolbar {
        position: absolute;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        border-radius: 50px;
        padding: 10px 20px;
        display: flex;
        align-items: center;
        gap: 15px;
        z-index: 100;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      }
      
      .toolbar-button {
        background: none;
        border: none;
        padding: 8px;
        border-radius: 50%;
        cursor: pointer;
        transition: all 0.3s ease;
        position: relative;
      }
      
      .toolbar-button:hover {
        background: rgba(102, 126, 234, 0.1);
        transform: translateY(-2px);
      }
      
      #modelName {
        font-family: 'Orbitron', monospace;
        font-weight: 700;
        font-size: 1.2rem;
        margin: 0;
        background: linear-gradient(45deg, #667eea, #764ba2);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      
      .tree-panel {
        position: absolute;
        top: 80px;
        left: 20px;
        width: 300px;
        max-height: calc(100vh - 120px);
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        border-radius: 12px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        z-index: 90;
        transition: transform 0.3s ease, opacity 0.3s ease;
      }
      
      .panel-hidden {
        transform: translateX(-320px);
        opacity: 0;
        pointer-events: none;
      }
      
      .tree-container {
        max-height: 400px;
        overflow-y: auto;
        padding: 1rem;
      }
      
      .tree-search-input {
        width: 100%;
        padding: 8px 12px;
        border: 1px solid #ddd;
        border-radius: 6px;
        margin: 1rem;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <!-- Loading Overlay -->
    <div id="loading-overlay" class="loading-overlay">
      <div class="loading-content">
        <h3>Loading 3D IFC Model</h3>
        <div class="progress-bar">
          <div id="progress-fill" class="progress-fill"></div>
        </div>
        <p id="loading-text">Initializing viewer...</p>
      </div>
    </div>

    <!-- Main Canvas -->
    <div id="container"></div>

    <!-- Toolbar -->
    <div id="toolbar">
      <button id="tree-toggle-btn" class="toolbar-button">
        <i class="fas fa-sitemap"></i>
      </button>
      <h1 id="modelName"><span>Uni</span>Qube</h1>
      <button id="status-toggle-btn" class="toolbar-button">
        <i class="fas fa-tags"></i>
      </button>
      <button id="groups-toggle-btn" class="toolbar-button">
        <i class="fas fa-layer-group"></i>
      </button>
      <button id="tree-reset-btn" class="toolbar-button">
        <i class="fas fa-home"></i>
      </button>
    </div>

    <!-- Tree Panel -->
    <div id="tree-panel" class="tree-panel panel-hidden">
      <div style="padding: 1rem; border-bottom: 1px solid #eee;">
        <h3 style="margin: 0; font-size: 1.1rem;">Model Structure</h3>
        <button id="tree-close-btn" style="float: right; background: none; border: none; font-size: 1.2rem; cursor: pointer;">&times;</button>
      </div>
      <input
        id="tree-search"
        type="text"
        placeholder="Search elements..."
        class="tree-search-input"
      />
      <div id="tree-container" class="tree-container">
        <p style="color: #666; text-align: center; padding: 2rem;">
          Load an IFC model to view structure
        </p>
      </div>
    </div>

    <script>
      // Communication with parent React component
      let isLoaded = false;
      
      // Simulate viewer initialization
      function initializeViewer() {
        const loadingOverlay = document.getElementById('loading-overlay');
        const progressFill = document.getElementById('progress-fill');
        const loadingText = document.getElementById('loading-text');
        
        let progress = 0;
        const interval = setInterval(() => {
          progress += Math.random() * 15;
          if (progress > 100) progress = 100;
          
          progressFill.style.width = progress + '%';
          
          if (progress < 30) {
            loadingText.textContent = 'Loading That Open Engine...';
          } else if (progress < 60) {
            loadingText.textContent = 'Initializing 3D scene...';
          } else if (progress < 90) {
            loadingText.textContent = 'Setting up BIM tools...';
          } else {
            loadingText.textContent = 'Almost ready...';
          }
          
          if (progress >= 100) {
            clearInterval(interval);
            setTimeout(() => {
              loadingOverlay.style.display = 'none';
              isLoaded = true;
              
              // Notify parent component
              window.parent.postMessage({
                type: 'VIEWER_LOADED',
                data: { ready: true }
              }, '*');
            }, 500);
          }
        }, 100);
      }
      
      // Handle messages from parent React component
      window.addEventListener('message', (event) => {
        const { type, data } = event.data;
        
        switch (type) {
          case 'LOAD_MODEL':
            if (data.url) {
              loadModel(data.url, data.projectId);
            }
            break;
          case 'RESET_VIEW':
            resetView();
            break;
        }
      });
      
      function loadModel(url, projectId) {
        if (!isLoaded) return;
        
        // Simulate model loading
        window.parent.postMessage({
          type: 'VIEWER_LOADING',
          data: { progress: 0 }
        }, '*');
        
        // Update tree panel
        const treeContainer = document.getElementById('tree-container');
        treeContainer.innerHTML = `
          <div style="padding: 1rem;">
            <h4>Project: ${projectId || 'Unknown'}</h4>
            <ul style="list-style: none; padding-left: 0;">
              <li>📁 Building Structure</li>
              <li style="padding-left: 20px;">🏗️ Foundation</li>
              <li style="padding-left: 20px;">🏗️ Structure</li>
              <li style="padding-left: 20px;">🏗️ Envelope</li>
              <li>📁 MEP Systems</li>
              <li style="padding-left: 20px;">⚡ Electrical</li>
              <li style="padding-left: 20px;">🌊 Plumbing</li>
              <li style="padding-left: 20px;">❄️ HVAC</li>
            </ul>
          </div>
        `;
        
        setTimeout(() => {
          window.parent.postMessage({
            type: 'VIEWER_LOADED',
            data: { modelUrl: url, projectId }
          }, '*');
        }, 2000);
      }
      
      function resetView() {
        console.log('Resetting view to home position');
      }
      
      // Toolbar interactions
      document.getElementById('tree-toggle-btn').addEventListener('click', () => {
        const panel = document.getElementById('tree-panel');
        panel.classList.toggle('panel-hidden');
      });
      
      document.getElementById('tree-close-btn').addEventListener('click', () => {
        document.getElementById('tree-panel').classList.add('panel-hidden');
      });
      
      document.getElementById('tree-reset-btn').addEventListener('click', () => {
        resetView();
      });
      
      // Initialize when page loads
      window.addEventListener('load', () => {
        initializeViewer();
      });
    </script>
  </body>
</html>
